<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Schmandt-Besserat Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1f2e;--s1:#222840;--s2:#2a3352;--border:#334066;
  --pink:#e8a0b0;--lav:#9b8fc7;--mint:#7ec8a4;--amber:#e8c080;
  --text:#e8eaf6;--muted:#7080a8;--correct:#7ec8a4;--wrong:#e08888;
  --mint-d:rgba(126,200,164,.13);--amber-d:rgba(232,192,128,.13);
  --lav-d:rgba(155,143,199,.13);
}
body{font-family:'Quicksand',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
.app{max-width:480px;margin:0 auto;padding:16px 14px 60px;min-height:100vh}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.brand{font-size:12px;color:var(--muted);font-weight:700;letter-spacing:.04em}
.streak{display:flex;align-items:center;gap:5px;background:var(--s1);border:1px solid var(--border);border-radius:100px;padding:5px 12px;font-size:13px;font-weight:700;color:var(--amber)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:12px}
.stat{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:9px 4px;text-align:center}
.sv{font-family:'JetBrains Mono',monospace;font-size:19px;font-weight:500;color:var(--text);display:block}
.sl{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-top:1px;display:block}
.prog-wrap{margin-bottom:12px}
.prog-row{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.prog-track{height:7px;background:var(--s2);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--lav),var(--pink));border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.q-grid-wrap{margin-bottom:14px}
.q-grid-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:700;margin-bottom:7px}
.q-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:5px}
.qb{font-family:'Quicksand',sans-serif;font-size:12px;font-weight:700;padding:7px 0;border-radius:9px;border:1.5px solid var(--border);background:var(--s2);color:var(--muted);cursor:pointer;text-align:center;transition:all .15s;-webkit-tap-highlight-color:transparent}
.qb:active{transform:scale(.93)}
.qb.cur{border-color:var(--lav);background:var(--lav);color:#fff;box-shadow:0 0 10px rgba(155,143,199,.35)}
.qb.done{border-color:var(--mint);background:var(--mint-d);color:var(--mint)}
.qb.err{border-color:var(--wrong);background:rgba(224,136,136,.1);color:var(--wrong)}
.qb.hint{border-color:var(--amber);background:var(--amber-d);color:var(--amber)}
.card{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:20px;margin-bottom:12px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--lav),var(--pink))}
.q-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.q-num{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--lav)}
.q-info{font-size:10px;background:var(--lav-d);border:1px solid rgba(155,143,199,.2);border-radius:100px;padding:2px 9px;color:var(--muted);font-weight:700}
.q-text{font-size:15px;color:var(--text);line-height:1.65;margin-bottom:14px;font-weight:600;padding-bottom:13px;border-bottom:1px solid var(--border)}
.a-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--mint);margin-bottom:11px}
.a-text{font-size:15px;color:var(--text);line-height:2.9}

/* plain word span — no highlight, no color, same as surrounding text */
.kw-plain{display:inline;color:inherit;font-weight:inherit}
/* only add transition for the disappear animation */
.kw-plain.dissolving{
  display:inline-block;
  opacity:0;
  transform:scale(.8);
  transition:opacity .2s ease, transform .2s ease;
}

.bw{display:inline-block;vertical-align:middle;margin:0 1px}
.bw.appearing{opacity:0;transition:opacity .2s ease}
.bw.visible{opacity:1}
.bw-inp{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;background:var(--s2);border:2px solid var(--lav);border-radius:8px;color:var(--text);padding:3px 7px;outline:none;text-align:center;-webkit-appearance:none;appearance:none;transition:border-color .15s,background .15s}
.bw-inp:focus{border-color:var(--pink);background:#2e3560}
.bw-inp.ok{border-color:var(--correct);background:var(--mint-d);color:var(--correct)}
.bw-inp.bad{border-color:var(--wrong);background:rgba(224,136,136,.1);animation:sh .3s ease}
.bw-inp.shown{border-color:var(--amber);background:var(--amber-d);color:var(--amber)}
.bw-inp:disabled{opacity:1;cursor:default}
@keyframes sh{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

.fb{padding:10px 14px;border-radius:12px;font-size:13px;font-weight:700;margin-bottom:12px;display:none;align-items:center;gap:8px;line-height:1.5}
.fb.show{display:flex}
.fb.ok{background:var(--mint-d);border:1px solid rgba(126,200,164,.3);color:var(--correct)}
.fb.bad{background:rgba(224,136,136,.1);border:1px solid rgba(224,136,136,.3);color:var(--wrong)}
.fb.info{background:var(--lav-d);border:1px solid rgba(155,143,199,.3);color:var(--lav)}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.btn{font-family:'Quicksand',sans-serif;font-size:14px;font-weight:700;padding:13px 12px;border-radius:14px;border:none;cursor:pointer;transition:all .15s;letter-spacing:.02em;-webkit-tap-highlight-color:transparent}
.btn-next{background:var(--mint);color:#0d2018;width:100%}
.btn-next:active{transform:scale(.97)}
.btn-sm{background:var(--s2);color:var(--muted);border:1px solid var(--border);font-size:13px;padding:11px 8px}
.btn-sm:active{color:var(--text);transform:scale(.97)}
.finish{display:none;text-align:center;padding:32px 12px}
.finish.show{display:block}
.fi{font-size:52px;margin-bottom:12px;animation:pop .6s ease}
@keyframes pop{0%{transform:scale(.4)}70%{transform:scale(1.15)}100%{transform:scale(1)}}
.ft{font-size:26px;font-weight:700;color:var(--mint);margin-bottom:6px}
.fs{font-size:13px;color:var(--muted);line-height:1.8;margin-bottom:20px}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.sc{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center}
.sc .sv{font-size:26px;color:var(--mint)}
/* hidden persistent input to keep keyboard open */
#kb-anchor{position:fixed;left:-9999px;top:50%;width:1px;height:1px;opacity:0;font-size:16px;border:none;outline:none;background:transparent;color:transparent}
</style>
</head>
<body>
<input id="kb-anchor" type="text" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" readonly>
<div class="app">
  <div class="hdr">
    <span class="brand">Schmandt-Besserat · 24 Qs</span>
    <span class="streak">🔥 <span id="streak">0</span></span>
  </div>
  <div class="stats">
    <div class="stat"><span class="sv" id="s-done">0</span><span class="sl">Done</span></div>
    <div class="stat"><span class="sv" id="s-perf">0</span><span class="sl">Perfect</span></div>
    <div class="stat"><span class="sv" id="s-hint">0</span><span class="sl">Hints</span></div>
    <div class="stat"><span class="sv" id="s-best">0</span><span class="sl">Best🔥</span></div>
  </div>
  <div class="prog-wrap">
    <div class="prog-row"><span>Progress</span><span id="prog-txt">0 / 24</span></div>
    <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div class="q-grid-wrap">
    <div class="q-grid-label">Select question</div>
    <div class="q-grid" id="q-grid"></div>
  </div>
  <div id="quiz-area">
    <div class="card">
      <div class="q-meta">
        <span class="q-num" id="q-num">Q1</span>
        <span class="q-info" id="q-info"></span>
      </div>
      <div class="q-text" id="q-text"></div>
      <div class="a-label">Fill in the blanks — correct answers unlock new ones</div>
      <div class="a-text" id="a-text"></div>
    </div>
    <div class="fb" id="fb"></div>
    <div id="next-row" style="display:none;margin-bottom:8px">
      <button class="btn btn-next" onclick="nextQ()">Next question →</button>
    </div>
    <div class="btn-row">
      <button class="btn btn-sm" onclick="showAns()">Show answers</button>
      <button class="btn btn-sm" onclick="resetQ()">↻ Reset</button>
    </div>
  </div>
  <div class="finish" id="finish">
    <div class="fi">🌸</div>
    <div class="ft">All 24 done!</div>
    <div class="fs" id="f-sub"></div>
    <div class="sg">
      <div class="sc"><span class="sv" id="f-p">0</span><span class="sl">Perfect</span></div>
      <div class="sc"><span class="sv" id="f-h">0</span><span class="sl">Hints</span></div>
      <div class="sc"><span class="sv" id="f-b">0</span><span class="sl">Best streak</span></div>
      <div class="sc"><span class="sv" id="f-pct">0%</span><span class="sl">Accuracy</span></div>
    </div>
    <button class="btn btn-next" onclick="restart()">Start over 🌸</button>
  </div>
</div>
<script>
// ── Questions: every content word tagged with [[word]]
// Stops: articles(a/an/the), be-verbs(is/was/were/are), prepositions(of/in/to/for/by/with/from/as/at/on),
// conjunctions(and/but/or/that/which/who/while/whereas/although), pronouns(it/they/them/their/its/this/these/those/such)
// Everything else is a potential blank.
const QS=[
  {q:"What is the difference between a symbol and a sign according to Schmandt-Besserat?",
   full:"A [[symbol]] [[carries]] [[deep]] but [[diffuse]] [[meaning]] and [[helps]] us [[conceive]] [[ideas]]. A [[sign]] is a [[subcategory]] of [[symbol]] that [[conveys]] [[narrow]], [[precise]], and [[unambiguous]] [[information]] and is [[bound]] to [[action]]."},
  {q:"What are the three categories of earliest symbolic evidence from the Middle Paleolithic Near East?",
   full:"[[First]], [[pieces]] of [[ocher]] ([[red]] [[pigment]], [[possibly]] for [[body]] [[painting]]) from [[Qafzeh]], [[Israel]]. [[Second]], [[funerary]] [[deposits]] such as [[flowers]] or [[antlers]] [[placed]] in [[burial]] [[sites]] (e.g., [[Shanidar]], ca. [[60,000]] B.C.). [[Third]], [[notched]] [[bones]], which are [[bone]] [[fragments]] [[engraved]] with [[parallel]] [[incisions]]."},
  {q:"What two remarkable contributions did Paleolithic tallies make to information processing?",
   full:"[[First]], [[tallies]] [[dealt]] with [[concrete]] [[data]] rather than [[ritual]] [[symbols]]. [[Second]], they [[abstracted]] [[data]] by [[translating]] [[concrete]] [[information]] into [[abstract]] [[markings]], [[removing]] [[data]] from [[context]], and [[separating]] [[knowledge]] from the [[knower]], [[creating]] a [[cold]] and [[static]] [[visual]] [[record]]."},
  {q:"What were the two main limitations of Paleolithic bone tallies?",
   full:"[[First]], the [[notches]] were [[unspecific]] and could not [[indicate]] what [[item]] was being [[counted]]; only the [[tallier]] [[knew]]. [[Second]], they [[used]] a [[one-to-one]] [[correspondence]] [[method]] and a [[single]] [[type]] of [[marking]], so they could [[handle]] only one [[type]] of [[data]] at a [[time]]."},
  {q:"What made clay tokens a fundamentally new form compared to pebbles or tallies?",
   full:"[[Tokens]] were [[entirely]] [[manmade]] [[artifacts]] [[created]] in [[specific]] [[shapes]] ([[cones]], [[spheres]], [[disks]], [[cylinders]], [[tetrahedrons]]) from [[clay]] for the [[sole]] [[purpose]] of [[communication]] and [[record]] [[keeping]]. Each [[shape]] had a [[single]], [[discrete]], and [[unequivocal]] [[meaning]], [[unlike]] [[repurposed]] [[objects]] [[used]] for [[counting]]."},
  {q:"What was the greatest novelty of the token system, according to Schmandt-Besserat?",
   full:"It [[created]] a [[system]], [[meaning]] an [[entire]] [[repertory]] of [[interrelated]] [[token]] [[types]] each with a [[discrete]] [[meaning]]. This [[made]] it [[possible]] to [[simultaneously]] [[handle]] [[information]] about [[different]] [[categories]] of [[goods]], [[achieving]] a [[complexity]] of [[data]] [[processing]] [[never]] [[reached]] [[before]]."},
  {q:"Why does Schmandt-Besserat call the token system the first code?",
   full:"[[Because]] the [[token]] [[shapes]] were [[systematized]] and [[used]] according to a [[rudimentary]] [[syntax]] ([[counters]] [[arranged]] [[hierarchically]], with the [[largest]] [[units]] [[placed]] at the [[right]]). The [[system]] could also be [[transmitted]] [[intact]] from [[community]] to [[community]] across the [[Near]] [[East]]."},
  {q:"How did tokens convey qualitative information, unlike tallies?",
   full:"The [[shape]] of a [[token]] [[indicated]] the [[type]] of [[commodity]] (e.g., [[cone]] = [[small]] [[measure]] of [[grain]]; [[ovoid]] = [[jar]] of [[oil]]), while the [[number]] of [[tokens]] [[indicated]] [[quantity]]. [[Tallies]] could only [[record]] [[quantity]] with no [[indication]] of what was being [[counted]]."},
  {q:"What is Semanticity as one of the ten features that presaged Sumerian writing?",
   full:"Each [[token]] was [[meaningful]] and [[communicated]] [[specific]] [[information]], [[unlike]] [[notches]] on a [[tally]], which were [[ambiguous]] and [[depended]] [[entirely]] on the [[tallier]]'s [[private]] [[knowledge]]."},
  {q:"What does Independence of phonetics mean in the context of the token system?",
   full:"The [[tokens]] were [[concept]] [[signs]] [[standing]] for [[units]] of [[goods]] and were not [[tied]] to any [[spoken]] [[language]] or [[dialect]]. They could therefore be [[understood]] by [[people]] who [[spoke]] [[different]] [[languages]], [[making]] the [[system]] [[widely]] [[transmissible]]."},
  {q:"What was the chief drawback of the token system's format?",
   full:"Its [[three-dimensionality]] was the [[chief]] [[drawback]]. While [[tangible]] and [[easy]] to [[manipulate]], the [[physical]] [[volume]] of [[tokens]] [[made]] them [[cumbersome]] in [[large]] [[quantities]], [[difficult]] to [[keep]] in [[permanent]] [[order]], and [[insufficient]] for [[recording]] [[complex]] [[messages]] beyond [[small]] [[transactions]]."},
  {q:"What four major innovations did pictographic writing bring over the token system?",
   full:"[[First]], [[pictographs]] [[held]] [[information]] [[permanently]]. [[Second]], [[tablets]] [[accommodated]] more [[diversified]] [[information]] through [[spatial]] [[organization]] of the [[field]]. [[Third]], [[numerals]] were [[created]], [[ending]] [[one-to-one]] [[correspondence]]. [[Fourth]], [[writing]] [[became]] [[phonetic]], [[reducing]] the [[repertory]] of [[symbols]] and [[opening]] [[writing]] to all [[subjects]] of [[human]] [[endeavor]]."},
  {q:"What are the three major phases of information processing evolution in the prehistoric Near East?",
   full:"[[First]], during the [[Middle]] and [[late]] [[Upper]] [[Paleolithic]] (ca. [[30,000]] to [[12,000]] B.C.), [[tallies]] [[referred]] to one [[unit]] of an [[unspecified]] [[item]]. [[Second]], in the [[early]] [[Neolithic]] (ca. [[8,000]] B.C.), [[tokens]] [[indicated]] a [[precise]] [[unit]] of a [[particular]] [[good]]. [[Third]], with [[writing]] in the [[urban]] [[period]] (ca. [[3,100]] B.C.), it [[became]] [[possible]] to [[record]] the [[name]] of the [[sponsor]] or [[recipient]] of [[transactions]]."},
  {q:"What does Schmandt-Besserat identify as the main debt of the token system to Paleolithic tallies?",
   full:"The [[principle]] of [[abstracting]] [[data]]. Like [[tallies]], [[tokens]] [[translated]] [[concrete]] [[information]] into [[abstract]] [[markings]], [[removed]] [[data]] from [[context]], [[separated]] [[knowledge]] from the [[knower]], and [[increased]] [[objectivity]]. The [[format]] of [[movable]] [[units]] was also [[likely]] [[inherited]] from the [[practice]] of [[counting]] with [[pebbles]]."},
  {q:"Why did the token system spread throughout the entire Near East?",
   full:"[[Because]] it was [[systematized]] and [[transmitted]] as a [[full-fledged]] [[code]] from [[community]] to [[community]], with each [[token]] [[form]] [[preserving]] the [[same]] [[meaning]]. Its [[simplicity]] ([[common]] [[clay]] [[material]], [[plain]] [[forms]], [[one-to-one]] [[correspondence]], and [[independence]] from [[phonetics]]) [[made]] [[adoption]] [[easy]] across [[different]] [[linguistic]] [[groups]]."},
  {q:"What does Openness mean as one of the ten features of the token system?",
   full:"The [[repertory]] of [[token]] [[shapes]] could be [[expanded]] at [[will]] by [[creating]] [[new]] [[shapes]] to [[represent]] [[new]] [[concepts]], and [[tokens]] could be [[combined]] into any [[possible]] [[set]]. This [[made]] it [[feasible]] to [[store]] an [[unlimited]] [[quantity]] of [[information]] concerning an [[unlimited]] [[number]] of [[items]]."},
  {q:"How does Schmandt-Besserat characterize the overall significance of the Neolithic token system?",
   full:"She [[calls]] it the [[second]] [[step]] in the [[evolution]] of [[communication]] and [[data]] [[processing]] and a [[major]] [[turning]] [[point]]. It was the [[first]] [[use]] of [[signs]] to [[manipulate]] [[concrete]] [[commodities]] of [[daily]] [[life]], [[provided]] the [[first]] [[means]] of [[supplementing]] [[language]], and [[gave]] the [[immediate]] [[background]] for the [[invention]] of [[writing]]."},
  {q:"What does Discreteness mean as one of the ten features that presaged Sumerian writing?",
   full:"The [[information]] [[conveyed]] by each [[token]] was [[specific]]. Each [[token]] [[shape]], like each [[pictograph]], was [[bestowed]] with a [[unique]] [[meaning]]. The [[incised]] [[ovoid]], for [[example]], like the [[sign]] [[ATU]] [[733]], [[stood]] for a [[unit]] of [[oil]]."},
  {q:"What does Systematization mean as one of the ten features that presaged Sumerian writing?",
   full:"Each of the [[token]] [[shapes]] was [[systematically]] [[repeated]] in [[order]] to [[carry]] the [[same]] [[meaning]]. An [[incised]] [[ovoid]], for [[example]], [[always]] [[signified]] the [[same]] [[measure]] of [[oil]]."},
  {q:"What does Codification mean as one of the ten features that presaged Sumerian writing?",
   full:"The [[token]] [[system]] [[consisted]] of a [[multiplicity]] of [[interrelated]] [[elements]]. [[Besides]] the [[cone]], which [[stood]] for a [[small]] [[measure]] of [[grain]], the [[sphere]] [[represented]] a [[larger]] [[measure]] of [[grain]], the [[ovoid]] [[meant]] a [[jar]] of [[oil]], the [[cylinder]] an [[animal]]. [[Consequently]], the [[token]] [[system]] [[made]] it [[feasible]], for the [[first]] [[time]], to [[deal]] [[simultaneously]] with [[information]] [[concerning]] [[different]] [[items]]."},
  {q:"What does Arbitrariness mean as one of the ten features that presaged Sumerian writing?",
   full:"[[Many]] of the [[token]] [[forms]] were [[abstract]] and [[bore]] no [[visual]] [[resemblance]] to what they [[represented]]. For [[example]], the [[cylinder]] and [[lenticular]] [[disk]] [[stood]] [[respectively]] for [[one]] and [[ten]] [[animals]]. [[Others]] were [[arbitrary]] [[representations]]; for [[instance]], the [[head]] of an [[animal]] [[bearing]] a [[collar]] [[symbolized]] the [[dog]]."},
  {q:"What does Discontinuity mean as one of the ten features that presaged Sumerian writing?",
   full:"[[Tokens]] of [[closely]] [[related]] [[shapes]] could [[refer]] to [[unrelated]] [[concepts]]. For [[example]], the [[lenticular]] [[disk]] [[stood]] for [[ten]] [[animals]], [[whereas]] the [[flat]] [[disk]] [[referred]] to a [[large]] [[measure]] of [[grain]]."},
  {q:"What does Syntax mean as one of the ten features that presaged Sumerian writing?",
   full:"The [[tokens]] were [[organized]] according to [[set]] [[rules]]. There is [[evidence]], for [[example]], that [[tokens]] were [[arranged]] in [[lines]] of [[counters]] of the [[same]] [[kind]], with the [[largest]] [[units]] [[placed]] at the [[right]]."},
  {q:"What does Economic content mean as one of the ten features that presaged Sumerian writing?",
   full:"The [[tokens]], like the [[earliest]] [[written]] [[texts]], were [[limited]] to [[handling]] [[information]] [[concerning]] [[real]] [[goods]]. It is only [[centuries]] [[later]], about [[2900]] B.C., that [[writing]] [[began]] to [[record]] [[historical]] [[events]] and [[religious]] [[texts]]."}
];

// ── global state ──
let cur=0, streak=0, best=0, perfects=0;
let doneSet=new Set(), hintSet=new Set(), errSet=new Set();

// ── per-question state ──
let wordParts=[];   // [{type:'text',content}|{type:'key',word,partIdx}]
let wordState=[];   // 'plain'|'blank'|'correct' for key parts
let wordEls=[];     // DOM element for each part
let blankOrder=[];  // indices of 'blank' parts in order they were created
let activeBlankIdx=0; // pointer into blankOrder for current focus

function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function parseQ(full){
  const parts=[];
  const re=/\[\[(.+?)\]\]/g;
  let last=0,m,ki=0;
  while((m=re.exec(full))!==null){
    if(m.index>last)parts.push({type:'text',content:full.slice(last,m.index)});
    parts.push({type:'key',word:m[1],partIdx:ki++});
    last=re.lastIndex;
  }
  if(last<full.length)parts.push({type:'text',content:full.slice(last)});
  return parts;
}

function loadQ(idx){
  cur=idx;
  const q=QS[idx];
  wordParts=parseQ(q.full);
  const keyIdxs=wordParts.map((p,i)=>p.type==='key'?i:-1).filter(i=>i>=0);
  // all start as plain
  wordState=wordParts.map(p=>p.type==='key'?'plain':null);
  wordEls=new Array(wordParts.length).fill(null);
  blankOrder=[];
  activeBlankIdx=0;

  document.getElementById('q-num').textContent='Q'+(cur+1);
  document.getElementById('q-info').textContent=keyIdxs.length+' words';
  document.getElementById('q-text').textContent=q.q;
  renderSentence();
  document.getElementById('next-row').style.display='none';
  clearFb();
  buildGrid();
  updateStats();

  // make initial 5 blanks (or all if fewer)
  const initial=shuffle([...keyIdxs]).slice(0,Math.min(5,keyIdxs.length));
  // sort by position so first blank is earliest in sentence
  initial.sort((a,b)=>a-b);
  initial.forEach(i=>{
    wordState[i]='blank';
    blankOrder.push(i);
    const el=makeBlankEl(wordParts[i].word,i);
    wordEls[i].parentNode.replaceChild(el,wordEls[i]);
    wordEls[i]=el;
  });
  // focus first blank
  focusBlank(0);
}

function renderSentence(){
  const at=document.getElementById('a-text');
  at.innerHTML='';
  wordParts.forEach((part,i)=>{
    let el;
    if(part.type==='text'){
      el=document.createTextNode(part.content);
      at.appendChild(el);
      wordEls[i]=null;
    } else {
      // all start as plain text spans
      el=makePlainEl(part.word,i);
      wordEls[i]=el;
      at.appendChild(el);
    }
  });
}

function makePlainEl(word,idx){
  const span=document.createElement('span');
  span.className='kw-plain';
  span.dataset.idx=idx;
  span.textContent=word;
  return span;
}

function makeBlankEl(word,idx){
  const wrap=document.createElement('span');
  wrap.className='bw appearing';
  const inp=document.createElement('input');
  inp.className='bw-inp';
  inp.dataset.word=word;
  inp.dataset.idx=idx;
  inp.style.width=Math.max(64,word.length*10+16)+'px';
  inp.placeholder='?';
  inp.autocomplete='off';
  inp.autocorrect='off';
  inp.autocapitalize='none';
  inp.spellcheck=false;
  inp.addEventListener('input',()=>onInput(inp));
  inp.addEventListener('keydown',e=>{
    if(e.key==='Enter'){
      const val=inp.value.trim().toLowerCase();
      const correct=inp.dataset.word.toLowerCase();
      if(val!==''&&val!==correct){
        inp.classList.add('bad');
        errSet.add(cur);
        buildGrid();
        setTimeout(()=>inp.classList.remove('bad'),350);
      }
    }
  });
  wrap.appendChild(inp);
  // trigger fade-in
  requestAnimationFrame(()=>{
    wrap.classList.remove('appearing');
    wrap.classList.add('visible');
  });
  return wrap;
}

function makeCorrectEl(word){
  const wrap=document.createElement('span');
  wrap.className='bw visible';
  const inp=document.createElement('input');
  inp.className='bw-inp ok';
  inp.value=word;
  inp.disabled=true;
  inp.style.width=Math.max(64,word.length*10+16)+'px';
  wrap.appendChild(inp);
  return wrap;
}

function makeShownEl(word){
  const wrap=document.createElement('span');
  wrap.className='bw visible';
  const inp=document.createElement('input');
  inp.className='bw-inp shown';
  inp.value=word;
  inp.disabled=true;
  inp.style.width=Math.max(64,word.length*10+16)+'px';
  wrap.appendChild(inp);
  return wrap;
}

function onInput(inp){
  const val=inp.value.trim().toLowerCase();
  const correct=inp.dataset.word.toLowerCase();
  if(val===correct){
    const idx=parseInt(inp.dataset.idx);
    inp.classList.add('ok');
    inp.disabled=true;
    wordState[idx]='correct';

    // find position of this blank in blankOrder
    const pos=blankOrder.indexOf(idx);

    // cascade: convert one more plain word to blank (without stealing focus)
    const plainIdxs=wordParts.map((p,i)=>(p.type==='key'&&wordState[i]==='plain')?i:-1).filter(i=>i>=0);
    if(plainIdxs.length>0){
      const target=plainIdxs[Math.floor(Math.random()*plainIdxs.length)];
      convertToBlank(target,pos);
    } else {
      // no more plain words — check if all correct
      const allDone=wordParts.every((p,i)=>p.type!=='key'||wordState[i]==='correct');
      if(allDone) setTimeout(onComplete,120);
      return;
    }

    // move focus to next unfilled blank in sentence order
    focusNextBlank(idx);
  }
}

function focusNextBlank(justFilledIdx){
  // find all blank (not correct) inputs in DOM order
  const blanks=[...document.querySelectorAll('.bw-inp:not(:disabled)')];
  if(blanks.length>0){
    // prefer the one that comes right after in the sentence
    // find blank whose idx > justFilledIdx (or wrap around)
    const after=blanks.filter(b=>parseInt(b.dataset.idx)>justFilledIdx);
    const target=after.length>0?after[0]:blanks[0];
    target.focus();
  }
}

function convertToBlank(idx, insertAfterPos){
  wordState[idx]='blank';
  const old=wordEls[idx];
  // insert into blankOrder after insertAfterPos
  blankOrder.push(idx);

  // dissolve the plain span
  old.classList.add('dissolving');
  setTimeout(()=>{
    const newEl=makeBlankEl(wordParts[idx].word,idx);
    if(old.parentNode) old.parentNode.replaceChild(newEl,old);
    wordEls[idx]=newEl;
    // do NOT focus this new blank — keep focus on current
  },200);
}

function focusBlank(orderIdx){
  if(blankOrder.length===0)return;
  const idx=blankOrder[Math.min(orderIdx,blankOrder.length-1)];
  const el=wordEls[idx];
  if(el){
    const inp=el.querySelector('input');
    if(inp&&!inp.disabled) setTimeout(()=>inp.focus(),60);
  }
}

function showAns(){
  hintSet.add(cur);streak=0;
  wordParts.forEach((p,i)=>{
    if(p.type==='key'&&wordState[i]!=='correct'){
      wordState[i]='correct';
      const old=wordEls[i];
      const newEl=makeShownEl(p.word);
      if(old&&old.parentNode) old.parentNode.replaceChild(newEl,old);
      wordEls[i]=newEl;
    }
  });
  showFb('info','Answers shown. Reset to try again.');
  document.getElementById('next-row').style.display='';
  buildGrid();updateStats();
}

function resetQ(){loadQ(cur);}
function nextQ(){if(cur<23)loadQ(cur+1);else showFinish();}
function goTo(i){if(i>=0&&i<=23)loadQ(i);}

function onComplete(){
  if(!hintSet.has(cur))perfects++;
  doneSet.add(cur);errSet.delete(cur);
  streak++;if(streak>best)best=streak;
  showFb('ok','All words filled! 🌸');
  document.getElementById('next-row').style.display='';
  buildGrid();updateStats();
  if(doneSet.size===24)setTimeout(showFinish,900);
}

function showFb(type,msg){const el=document.getElementById('fb');el.className='fb show '+type;el.textContent=msg;}
function clearFb(){const el=document.getElementById('fb');el.className='fb';el.textContent='';}

function buildGrid(){
  const g=document.getElementById('q-grid');g.innerHTML='';
  for(let i=0;i<24;i++){
    const b=document.createElement('button');
    b.className='qb'+(i===cur?' cur':'')+(doneSet.has(i)?' done':'')+(hintSet.has(i)&&!doneSet.has(i)?' hint':'')+(errSet.has(i)&&!doneSet.has(i)&&!hintSet.has(i)?' err':'');
    b.textContent=i+1;
    b.onclick=()=>goTo(i);
    g.appendChild(b);
  }
}

function updateStats(){
  document.getElementById('s-done').textContent=doneSet.size;
  document.getElementById('s-perf').textContent=perfects;
  document.getElementById('s-hint').textContent=hintSet.size;
  document.getElementById('s-best').textContent=best;
  document.getElementById('streak').textContent=streak;
  const pct=Math.round((doneSet.size/24)*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-txt').textContent=doneSet.size+' / 24';
}

function showFinish(){
  document.getElementById('quiz-area').style.display='none';
  document.getElementById('finish').classList.add('show');
  const pct=Math.round((perfects/24)*100);
  document.getElementById('f-p').textContent=perfects;
  document.getElementById('f-h').textContent=hintSet.size;
  document.getElementById('f-b').textContent=best;
  document.getElementById('f-pct').textContent=pct+'%';
  document.getElementById('f-sub').textContent=pct>=90?'Outstanding! 🌸':pct>=70?"Good work! Keep drilling.":"Keep going — you've got this.";
}

function restart(){
  cur=0;streak=0;best=0;perfects=0;
  doneSet=new Set();hintSet=new Set();errSet=new Set();
  document.getElementById('quiz-area').style.display='';
  document.getElementById('finish').classList.remove('show');
  loadQ(0);
}

// keep keyboard open on mobile: route all keystrokes from kb-anchor to active input
const anchor=document.getElementById('kb-anchor');
anchor.addEventListener('input',()=>{
  const active=document.querySelector('.bw-inp:focus:not(:disabled)');
  if(active){
    active.value+=anchor.value;
    anchor.value='';
    // trigger input event
    active.dispatchEvent(new Event('input'));
  } else {
    anchor.value='';
  }
});

loadQ(0);
</script>
</body>
</html>
