<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Schmandt-Besserat Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#1a1f2e;--s1:#222840;--s2:#2a3352;--border:#334066;
  --pink:#e8a0b0;--lav:#9b8fc7;--mint:#7ec8a4;--amber:#e8c080;
  --text:#e8eaf6;--muted:#7080a8;--correct:#7ec8a4;--wrong:#e08888;
  --pink-d:rgba(232,160,176,.13);--lav-d:rgba(155,143,199,.13);
  --mint-d:rgba(126,200,164,.13);--amber-d:rgba(232,192,128,.13);
}
body{font-family:'Quicksand',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased}
.app{max-width:480px;margin:0 auto;padding:18px 14px 48px;min-height:100vh}
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.brand{font-size:13px;color:var(--muted);font-weight:700;letter-spacing:.04em}
.streak{display:flex;align-items:center;gap:5px;background:var(--s1);border:1px solid var(--border);border-radius:100px;padding:5px 13px;font-size:13px;font-weight:700;color:var(--amber)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}
.stat{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:10px 4px;text-align:center}
.sv{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:500;color:var(--text);display:block}
.sl{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-top:2px;display:block}
.prog-wrap{margin-bottom:12px}
.prog-row{display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase}
.prog-track{height:8px;background:var(--s2);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--lav),var(--pink));border-radius:4px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.dots{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:14px}
.dot{width:16px;height:8px;border-radius:4px;background:var(--s2);border:1px solid var(--border);cursor:pointer;transition:all .2s;flex-shrink:0}
.dot.cur{background:var(--lav);border-color:var(--lav);width:24px}
.dot.done{background:var(--mint);border-color:var(--mint)}
.dot.err{background:var(--wrong);border-color:var(--wrong)}
.card{background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:20px;margin-bottom:12px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--lav),var(--pink))}
.q-meta{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.q-num{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--lav)}
.q-badge{font-size:10px;background:var(--lav-d);border:1px solid rgba(155,143,199,.25);border-radius:100px;padding:2px 10px;color:var(--lav);font-weight:700}
.q-text{font-size:15px;color:var(--text);line-height:1.65;margin-bottom:16px;font-weight:600;padding-bottom:14px;border-bottom:1px solid var(--border)}
.a-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--mint);margin-bottom:12px}
.a-text{font-size:15px;color:var(--text);line-height:2.8}
.bw{display:inline-block;position:relative;vertical-align:middle;margin:0 2px}
.bw input{font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:500;background:var(--s2);border:2px solid var(--lav);border-radius:8px;color:var(--text);padding:3px 7px;outline:none;text-align:center;-webkit-appearance:none;appearance:none;transition:border-color .2s,background .2s,box-shadow .2s}
.bw input:focus{border-color:var(--pink);box-shadow:0 0 0 3px var(--pink-d);background:#2e3560}
.bw input.ok{border-color:var(--correct);background:var(--mint-d);color:var(--correct)}
.bw input.bad{border-color:var(--wrong);background:rgba(224,136,136,.1);animation:sh .32s ease}
.bw input.shown{border-color:var(--amber);background:var(--amber-d);color:var(--amber)}
.bw input:disabled{opacity:1}
@keyframes sh{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
.fb{padding:10px 14px;border-radius:12px;font-size:13px;font-weight:700;margin-bottom:12px;display:none;align-items:center;gap:8px;line-height:1.5}
.fb.show{display:flex}
.fb.ok{background:var(--mint-d);border:1px solid rgba(126,200,164,.3);color:var(--correct)}
.fb.bad{background:rgba(224,136,136,.1);border:1px solid rgba(224,136,136,.3);color:var(--wrong)}
.fb.info{background:var(--lav-d);border:1px solid rgba(155,143,199,.3);color:var(--lav)}
.btn-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.btn-row2{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.btn{font-family:'Quicksand',sans-serif;font-size:14px;font-weight:700;padding:13px 12px;border-radius:14px;border:none;cursor:pointer;transition:all .15s;letter-spacing:.02em;-webkit-tap-highlight-color:transparent}
.btn-check{background:var(--lav);color:#fff}
.btn-check:active{background:#8a7eb8;transform:scale(.97)}
.btn-next{background:var(--mint);color:#0d2018}
.btn-next:active{background:#6db893;transform:scale(.97)}
.btn-sm{background:var(--s2);color:var(--muted);border:1px solid var(--border);font-size:12px;padding:10px 8px}
.btn-sm:active{color:var(--text);transform:scale(.97)}
.nav-row{display:flex;align-items:center;justify-content:space-between;margin-top:10px}
.nav-btn{background:var(--s2);border:1px solid var(--border);border-radius:10px;color:var(--muted);font-size:13px;font-weight:700;padding:8px 16px;cursor:pointer;font-family:'Quicksand',sans-serif;-webkit-tap-highlight-color:transparent}
.nav-btn:active{color:var(--text)}
.nav-btn:disabled{opacity:.3;cursor:default}
.nav-info{font-size:12px;color:var(--muted);font-weight:700}
.finish{display:none;text-align:center;padding:32px 12px}
.finish.show{display:block}
.fi{font-size:52px;margin-bottom:12px;animation:pop .6s ease}
@keyframes pop{0%{transform:scale(.4)}70%{transform:scale(1.15)}100%{transform:scale(1)}}
.ft{font-size:26px;font-weight:700;color:var(--mint);margin-bottom:6px}
.fs{font-size:13px;color:var(--muted);line-height:1.8;margin-bottom:20px}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px}
.sc{background:var(--s1);border:1px solid var(--border);border-radius:14px;padding:14px;text-align:center}
.sc .sv{font-size:26px;color:var(--mint)}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <span class="brand">Schmandt-Besserat</span>
    <span class="streak">🔥 <span id="streak">0</span></span>
  </div>
  <div class="stats">
    <div class="stat"><span class="sv" id="s-done">0</span><span class="sl">Done</span></div>
    <div class="stat"><span class="sv" id="s-perf">0</span><span class="sl">Perfect</span></div>
    <div class="stat"><span class="sv" id="s-hint">0</span><span class="sl">Hints</span></div>
    <div class="stat"><span class="sv" id="s-best">0</span><span class="sl">Best🔥</span></div>
  </div>
  <div class="prog-wrap">
    <div class="prog-row"><span>Progress</span><span id="prog-txt">0 / 24</span></div>
    <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
  </div>
  <div class="dots" id="dots"></div>
  <div id="quiz-area">
    <div class="card">
      <div class="q-meta">
        <span class="q-num" id="q-num">Q1</span>
        <span class="q-badge" id="q-badge">1 of 24</span>
      </div>
      <div class="q-text" id="q-text"></div>
      <div class="a-label">Answer — fill in the blanks</div>
      <div class="a-text" id="a-text"></div>
    </div>
    <div class="fb" id="fb"></div>
    <div class="btn-row">
      <button class="btn btn-check" id="check-btn" onclick="check()">Check ✓</button>
      <button class="btn btn-next" id="next-btn" onclick="nextQ()" style="display:none">Next →</button>
    </div>
    <div class="btn-row2">
      <button class="btn btn-sm" onclick="showAns()">Show answers</button>
      <button class="btn btn-sm" onclick="resetQ()">Reset</button>
      <button class="btn btn-sm" onclick="skipQ()">Skip →</button>
    </div>
    <div class="nav-row">
      <button class="nav-btn" id="prev-btn" onclick="goTo(cur-1)">← Prev</button>
      <span class="nav-info" id="nav-info"></span>
      <button class="nav-btn" id="next-nav" onclick="goTo(cur+1)">Next →</button>
    </div>
  </div>
  <div class="finish" id="finish">
    <div class="fi">🌸</div>
    <div class="ft">All 24 done!</div>
    <div class="fs" id="f-sub"></div>
    <div class="sg">
      <div class="sc"><span class="sv" id="f-p">0</span><span class="sl">Perfect</span></div>
      <div class="sc"><span class="sv" id="f-h">0</span><span class="sl">Hints used</span></div>
      <div class="sc"><span class="sv" id="f-b">0</span><span class="sl">Best streak</span></div>
      <div class="sc"><span class="sv" id="f-pct">0%</span><span class="sl">Accuracy</span></div>
    </div>
    <button class="btn btn-next" style="width:100%;padding:14px" onclick="restart()">Start over 🌸</button>
  </div>
</div>
<script>
const QS=[
  {q:"What is the difference between a symbol and a sign according to Schmandt-Besserat?",p:["A symbol carries deep but [[diffuse]] meaning and helps us [[conceive]] ideas. A sign is a [[subcategory]] of symbol that conveys [[narrow]], [[precise]], and [[unambiguous]] information and is bound to [[action]]."]},
  {q:"What are the three categories of earliest symbolic evidence from the Middle Paleolithic Near East?",p:["First, pieces of [[ocher]] (red pigment, possibly for [[body painting]]) from [[Qafzeh]], Israel. Second, [[funerary]] deposits such as flowers or antlers placed in [[burial]] sites (e.g., [[Shanidar]], ca. [[60,000]] B.C.). Third, [[notched]] bones, which are bone fragments engraved with parallel [[incisions]]."]},
  {q:"What two remarkable contributions did Paleolithic tallies make to information processing?",p:["First, tallies dealt with [[concrete]] data rather than [[ritual]] symbols. Second, they [[abstracted]] data by translating concrete information into [[abstract]] markings, removing data from [[context]], and separating [[knowledge]] from the [[knower]], creating a [[cold]] and [[static]] visual record."]},
  {q:"What were the two main limitations of Paleolithic bone tallies?",p:["First, the notches were [[unspecific]] and could not indicate what item was being counted; only the [[tallier]] knew. Second, they used a [[one-to-one]] correspondence method and a [[single]] type of marking, so they could handle only one type of data at a time."]},
  {q:"What made clay tokens a fundamentally new form compared to pebbles or tallies?",p:["Tokens were entirely [[manmade]] artifacts created in specific shapes ([[cones]], [[spheres]], [[disks]], [[cylinders]], [[tetrahedrons]]) from [[clay]] for the sole purpose of [[communication]] and [[record keeping]]. Each shape had a single, [[discrete]], and [[unequivocal]] meaning, unlike [[repurposed]] objects used for counting."]},
  {q:'What was the "greatest novelty" of the token system, according to Schmandt-Besserat?',p:["It created a [[system]], meaning an entire [[repertory]] of [[interrelated]] token types each with a [[discrete]] meaning. This made it possible to [[simultaneously]] handle information about different [[categories]] of goods, achieving a [[complexity]] of data processing [[never]] reached before."]},
  {q:'Why does Schmandt-Besserat call the token system "the first code"?',p:["Because the token shapes were [[systematized]] and used according to a [[rudimentary]] [[syntax]] (counters arranged [[hierarchically]], with the largest units placed at the [[right]]). The system could also be [[transmitted]] [[intact]] from community to community across the [[Near East]]."]},
  {q:"How did tokens convey qualitative information, unlike tallies?",p:["The [[shape]] of a token indicated the type of [[commodity]] (e.g., [[cone]] = small measure of grain; [[ovoid]] = jar of oil), while the [[number]] of tokens indicated [[quantity]]. Tallies could only record quantity with no [[indication]] of what was being counted."]},
  {q:'What is "Semanticity" as one of the ten features that presaged Sumerian writing?',p:["Each token was [[meaningful]] and communicated [[specific]] information, unlike notches on a tally, which were [[ambiguous]] and depended entirely on the tallier's [[private]] knowledge."]},
  {q:'What does "Independence of phonetics" mean in the context of the token system?',p:["The tokens were [[concept]] signs standing for units of goods and were not tied to any spoken language or [[dialect]]. They could therefore be understood by people who spoke [[different]] languages, making the system widely [[transmissible]]."]},
  {q:"What was the chief drawback of the token system's format?",p:["Its [[three-dimensionality]] was the chief drawback. While [[tangible]] and easy to [[manipulate]], the physical [[volume]] of tokens made them [[cumbersome]] in large quantities, difficult to keep in [[permanent]] order, and [[insufficient]] for recording complex messages beyond small transactions."]},
  {q:"What four major innovations did pictographic writing bring over the token system?",p:["First, pictographs held information [[permanently]]. Second, tablets accommodated more [[diversified]] information through [[spatial]] organization of the field. Third, [[numerals]] were created, ending [[one-to-one]] correspondence. Fourth, writing became [[phonetic]], reducing the [[repertory]] of symbols and opening writing to all subjects of human [[endeavor]]."]},
  {q:"What are the three major phases of information processing evolution in the prehistoric Near East?",p:["First, during the Middle and late Upper [[Paleolithic]] (ca. [[30,000]] to [[12,000]] B.C.), tallies referred to one unit of an [[unspecified]] item. Second, in the early [[Neolithic]] (ca. [[8,000]] B.C.), tokens indicated a [[precise]] unit of a particular good. Third, with writing in the [[urban]] period (ca. [[3,100]] B.C.), it became possible to record the name of the [[sponsor]] or [[recipient]] of transactions."]},
  {q:'What does Schmandt-Besserat identify as the "main debt" of the token system to Paleolithic tallies?',p:["The principle of [[abstracting]] data. Like tallies, tokens translated concrete information into [[abstract]] [[markings]], removed data from [[context]], separated knowledge from the [[knower]], and increased [[objectivity]]. The format of [[movable]] units was also likely [[inherited]] from the practice of counting with [[pebbles]]."]},
  {q:"Why did the token system spread throughout the entire Near East?",p:["Because it was [[systematized]] and transmitted as a [[full-fledged]] code from community to community, with each token form [[preserving]] the same meaning. Its simplicity (common [[clay]] material, plain forms, [[one-to-one]] correspondence, and independence from [[phonetics]]) made [[adoption]] easy across different [[linguistic]] groups."]},
  {q:'What does "Openness" mean as one of the ten features of the token system?',p:["The repertory of token shapes could be [[expanded]] at will by creating new shapes to represent new [[concepts]], and tokens could be [[combined]] into any possible set. This made it [[feasible]] to store an [[unlimited]] quantity of information concerning an unlimited number of items."]},
  {q:"How does Schmandt-Besserat characterize the overall significance of the Neolithic token system?",p:["She calls it the [[second]] step in the [[evolution]] of communication and data processing and a major [[turning point]]. It was the first use of signs to [[manipulate]] concrete [[commodities]] of daily life, provided the first means of [[supplementing]] language, and gave the immediate background for the [[invention]] of writing."]},
  {q:'What does "Discreteness" mean as one of the ten features that presaged Sumerian writing?',p:["The information conveyed by each token was [[specific]]. Each token shape, like each [[pictograph]], was [[bestowed]] with a unique meaning. The incised [[ovoid]], for example, like the sign [[ATU 733]], stood for a unit of [[oil]]."]},
  {q:'What does "Systematization" mean as one of the ten features that presaged Sumerian writing?',p:["Each of the token shapes was [[systematically]] [[repeated]] in order to carry the same meaning. An incised [[ovoid]], for example, always [[signified]] the same measure of [[oil]]."]},
  {q:'What does "Codification" mean as one of the ten features that presaged Sumerian writing?',p:["The token system consisted of a [[multiplicity]] of [[interrelated]] elements. Besides the [[cone]], which stood for a small measure of grain, the [[sphere]] represented a larger measure of grain, the [[ovoid]] meant a jar of oil, the [[cylinder]] an animal. Consequently, the token system made it [[feasible]], for the first time, to deal [[simultaneously]] with information concerning different items."]},
  {q:'What does "Arbitrariness" mean as one of the ten features that presaged Sumerian writing?',p:["Many of the token forms were [[abstract]] and bore no visual [[resemblance]] to what they represented. For example, the [[cylinder]] and [[lenticular]] disk stood [[respectively]] for one and [[ten]] animals. Others were [[arbitrary]] representations; for instance, the head of an animal bearing a [[collar]] symbolized the [[dog]]."]},
  {q:'What does "Discontinuity" mean as one of the ten features that presaged Sumerian writing?',p:["Tokens of closely related shapes could refer to [[unrelated]] concepts. For example, the [[lenticular]] disk stood for [[ten]] animals, whereas the [[flat]] disk referred to a large measure of [[grain]]."]},
  {q:'What does "Syntax" mean as one of the ten features that presaged Sumerian writing?',p:["The tokens were organized according to set [[rules]]. There is evidence, for example, that tokens were arranged in lines of [[counters]] of the same kind, with the [[largest]] units placed at the [[right]]."]},
  {q:'What does "Economic content" mean as one of the ten features that presaged Sumerian writing?',p:["The tokens, like the earliest written texts, were [[limited]] to handling information concerning [[real]] goods. It is only [[centuries]] later, about [[2900]] B.C., that writing began to record [[historical]] events and [[religious]] texts."]}
];
function parseParts(str){const res=[];const re=/\[\[(.+?)\]\]/g;let last=0,m;while((m=re.exec(str))!==null){if(m.index>last)res.push({t:str.slice(last,m.index)});res.push({b:m[1]});last=re.lastIndex;}if(last<str.length)res.push({t:str.slice(last)});return res;}
let cur=0,streak=0,best=0,perfects=0,hints=0;
let doneSet=new Set(),errSet=new Set(),hintSet=new Set();
function bw(word){return Math.max(68,word.length*11)+'px'}
function buildDots(){const c=document.getElementById('dots');c.innerHTML='';for(let i=0;i<24;i++){const d=document.createElement('div');d.className='dot'+(i===cur?' cur':'')+(doneSet.has(i)?' done':'')+(errSet.has(i)&&!doneSet.has(i)?' err':'');d.onclick=()=>goTo(i);c.appendChild(d);}}
function renderQ(){const q=QS[cur];document.getElementById('q-num').textContent='Q'+(cur+1);document.getElementById('q-badge').textContent=(cur+1)+' of 24';document.getElementById('q-text').textContent=q.q;const at=document.getElementById('a-text');at.innerHTML='';q.p.forEach(raw=>{parseParts(raw).forEach(part=>{if(part.t!==undefined){at.appendChild(document.createTextNode(part.t));}else{const wrap=document.createElement('span');wrap.className='bw';const inp=document.createElement('input');inp.dataset.word=part.b;inp.style.width=bw(part.b);inp.placeholder='?';inp.autocomplete='off';inp.autocorrect='off';inp.autocapitalize='none';inp.spellcheck=false;inp.addEventListener('keydown',e=>{if(e.key==='Enter')check()});wrap.appendChild(inp);at.appendChild(wrap);}});});clearFb();document.getElementById('check-btn').style.display='';document.getElementById('next-btn').style.display='none';document.getElementById('prev-btn').disabled=cur===0;document.getElementById('next-nav').disabled=cur===23;document.getElementById('nav-info').textContent=(cur+1)+' / 24';buildDots();updateStats();const first=document.querySelector('.bw input');if(first)setTimeout(()=>first.focus(),80);}
function check(){const inputs=document.querySelectorAll('.bw input:not(:disabled)');if(!inputs.length)return;const filled=[...inputs].filter(i=>i.value.trim()!=='');if(!filled.length){showFb('info','まず空欄を埋めてね！');return;}let allOk=true;inputs.forEach(inp=>{const val=inp.value.trim().toLowerCase();const correct=inp.dataset.word.toLowerCase();inp.classList.remove('ok','bad','shown');if(val===correct){inp.classList.add('ok');}else{void inp.offsetWidth;inp.classList.add('bad');allOk=false;}});const allFilled=[...inputs].every(i=>i.value.trim()!=='');if(allOk&&allFilled){streak++;if(streak>best)best=streak;if(!hintSet.has(cur))perfects++;doneSet.add(cur);errSet.delete(cur);inputs.forEach(i=>i.disabled=true);showFb('ok','Perfect! 🌸 All correct!');document.getElementById('check-btn').style.display='none';document.getElementById('next-btn').style.display='';updateStats();buildDots();if(doneSet.size===24)setTimeout(showFinish,900);}else{streak=0;errSet.add(cur);showFb('bad','Wrong or empty blanks — keep trying!');updateStats();buildDots();}}
function showAns(){hintSet.add(cur);hints=hintSet.size;streak=0;document.querySelectorAll('.bw input').forEach(inp=>{inp.value=inp.dataset.word;inp.classList.remove('ok','bad');inp.classList.add('shown');inp.disabled=true;});showFb('info','Answers shown. Reset to try again.');document.getElementById('check-btn').style.display='none';document.getElementById('next-btn').style.display='';updateStats();buildDots();}
function resetQ(){errSet.delete(cur);doneSet.delete(cur);document.getElementById('check-btn').style.display='';document.getElementById('next-btn').style.display='none';renderQ();}
function skipQ(){if(cur<23){cur++;renderQ();}else showFinish();}
function nextQ(){if(cur<23){cur++;renderQ();}else showFinish();}
function goTo(i){if(i<0||i>23)return;cur=i;renderQ();}
function showFb(type,msg){const el=document.getElementById('fb');el.className='fb show '+type;el.textContent=msg;}
function clearFb(){const el=document.getElementById('fb');el.className='fb';el.textContent='';}
function updateStats(){document.getElementById('s-done').textContent=doneSet.size;document.getElementById('s-perf').textContent=perfects;document.getElementById('s-hint').textContent=hintSet.size;document.getElementById('s-best').textContent=best;document.getElementById('streak').textContent=streak;const pct=Math.round((doneSet.size/24)*100);document.getElementById('prog-fill').style.width=pct+'%';document.getElementById('prog-txt').textContent=doneSet.size+' / 24';}
function showFinish(){document.getElementById('quiz-area').style.display='none';document.getElementById('finish').classList.add('show');const pct=Math.round((perfects/24)*100);document.getElementById('f-p').textContent=perfects;document.getElementById('f-h').textContent=hintSet.size;document.getElementById('f-b').textContent=best;document.getElementById('f-pct').textContent=pct+'%';document.getElementById('f-sub').textContent=pct>=90?'Outstanding! You clearly know this material. 🌸':pct>=70?"Good work! A couple more rounds and you'll nail it.":'Keep going! Repetition is everything. You\'ve got this.';}
function restart(){cur=0;streak=0;best=0;perfects=0;hints=0;doneSet=new Set();errSet=new Set();hintSet=new Set();document.getElementById('quiz-area').style.display='';document.getElementById('finish').classList.remove('show');renderQ();updateStats();}
renderQ();
</script>
</body>
</html>
